<!doctype html>
<html>
  <head>
    <title>GeoEvents</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="globals.css" />
  </head>

  <body>
    <div id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <h1>GeoEvents</h1>
          <small>Mapa de eventos e geometrias</small>
        </div>
        <div class="status-pill">Leaflet • Local API</div>
      </div>

      <div class="section">
        <div class="section-title">Ações rápidas</div>
        <div class="grid-2">
          <button class="btn btn--primary" onclick="mostrarFormularioCriar()">
            + Novo evento
          </button>
          <button
            class="btn btn--secondary"
            onclick="mostrarFormularioImportar()"
          >
            Importar GeoJSON
          </button>
        </div>
      </div>

      <div id="formImportar" class="hidden panel">
        <h3>Importar arquivo</h3>
        <p class="hint">
          Selecione um arquivo JSON ou GeoJSON com a lista de eventos.
        </p>
        <input
          type="file"
          id="fileImport"
          accept=".json,.geojson"
          onchange="importarArquivo(event)"
        />
        <button class="btn" onclick="cancelarFormulario()">Cancelar</button>
      </div>

      <div class="section">
        <div class="section-title">Ferramentas de desenho</div>
        <p class="hint">
          Escolha um modo e interaja no mapa. Duplo clique finaliza linhas e
          polígonos.
        </p>

        <div class="tool-grid" style="margin-top: 10px">
          <button
            id="btnDesenhoPonto"
            class="btn tool-btn"
            onclick="ativarModoDesenhoPonto()"
            type="button"
          >
            Ponto
          </button>
          <button
            id="btnDesenhoLinha"
            class="btn tool-btn"
            onclick="ativarModoDesenhoLinha()"
            type="button"
          >
            Linha
          </button>
          <button
            id="btnDesenhoPoligono"
            class="btn tool-btn"
            onclick="ativarModoDesenhoPoligono()"
            type="button"
          >
            Polígono
          </button>
        </div>
        <div class="btn-row" style="margin-top: 10px">
          <button
            id="btnCancelarDesenho"
            class="btn btn--danger hidden"
            onclick="cancelarModoDesenho()"
            type="button"
          >
            Cancelar desenho
          </button>
        </div>
      </div>

      <div id="formCriar" class="hidden panel">
        <h3>Criar novo evento</h3>
        <div class="form-group">
          <label>Nome:</label>
          <input type="text" id="nome" placeholder="Nome do evento" />
        </div>
        <div class="form-group">
          <label>Descrição:</label>
          <textarea id="descricao" placeholder="Descrição do evento"></textarea>
        </div>
        <div class="form-group">
          <label>Tipo:</label>
          <select id="tipo">
            <option value="geral">Geral</option>
            <option value="festival">Festival</option>
            <option value="conferencia">Conferência</option>
            <option value="encontro">Encontro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Latitude:</label>
          <input type="number" id="lat" placeholder="-20.4697" step="0.0001" />
        </div>
        <div class="form-group">
          <label>Longitude:</label>
          <input type="number" id="lng" placeholder="-54.6201" step="0.0001" />
        </div>
        <div class="form-actions">
          <button class="btn btn--primary" onclick="salvarEvento()">
            Salvar
          </button>
          <button class="btn" onclick="cancelarFormulario()">Cancelar</button>
        </div>
      </div>

      <div id="formEditar" class="hidden panel">
        <h3>Editar evento</h3>
        <div class="form-group">
          <label>Nome:</label>
          <input type="text" id="editNome" placeholder="Nome do evento" />
        </div>
        <div class="form-group">
          <label>Descrição:</label>
          <textarea
            id="editDescricao"
            placeholder="Descrição do evento"
          ></textarea>
        </div>
        <div class="form-group">
          <label>Tipo:</label>
          <select id="editTipo">
            <option value="geral">Geral</option>
            <option value="festival">Festival</option>
            <option value="conferencia">Conferência</option>
            <option value="encontro">Encontro</option>
          </select>
        </div>
        <div class="form-actions">
          <button class="btn btn--primary" onclick="atualizarEvento()">
            Atualizar
          </button>
          <button class="btn" onclick="cancelarFormulario()">Cancelar</button>
        </div>
      </div>

      <div class="success" id="successMsg"></div>

      <div class="section" style="margin-bottom: 18px">
        <div class="eventos-title">Eventos</div>
        <div id="eventosList"></div>
      </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="index.js"></script>
  </body>
</html>
